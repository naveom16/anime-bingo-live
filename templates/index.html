<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Bingo - Reconnect Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div id="loginOverlay" class="login-overlay" style="display:none;">
        <div class="login-box panel-card">
            <h1>ANIME BINGO</h1>
            <p>กรุณาระบุชื่อเพื่อร่วมสนุก</p>
            <input type="text" id="username" placeholder="ชื่อเล่นของคุณ...">
            <button onclick="enterGame()">เข้าร่วมเกม</button>
        </div>
    </div>

    <div class="app-shell">
        <aside class="player-sidebar">
            <div class="panel-card player-info-panel">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <h2 style="margin:0;">ผู้เล่น</h2>
                    <div id="timerDisplay" class="timer-display" style="margin:0;">
                        <span class="timer-value" id="timerValue">2:00</span>
                    </div>
                </div>
                <div id="playerList" class="player-list"></div>
            </div>
        </aside>

        <main class="game-area">
            <section class="player-status-container" id="players"></section>
            <div id="turnIndicator" class="turn-indicator">รอเชื่อมต่อ...</div>

            <div class="bingo-container" id="bingoGrid"></div>

            <div class="action-row">
                <button id="confirm" onclick="showConfirmModal()" disabled>ยืนยันช่องนี้</button>
                <button id="skip" onclick="socket.emit('skip_turn')" disabled>ข้ามตานี้</button>
                <button id="reset" onclick="socket.emit('request_reset')">รีเซ็ตเกม</button>
                <button id="kickAll" onclick="socket.emit('kick_all_except_me')" style="background:#e74c3c;">Kick ทุกคน</button>
            </div>
            <div class="action-row" id="resetVoteRow" style="display:none;">
                <span style="color:#999;font-size:0.9rem;">โหวตรีเซ็ต: </span>
                <button id="voteReset" onclick="socket.emit('vote_reset_game')">โหวตรีเซ็ต</button>
                <span id="resetVoteCount" style="color:#fff;font-size:0.9rem;">0/0</span>
            </div>
        </main>

        <aside class="search-sidebar">
            <div class="panel-card search-panel">
                <h2>ค้นหาตัวละคร</h2>
                
                <!-- Row 1: Search anime -->
                <input id="search" class="search-input" placeholder="พิมพ์ชื่ออนิเมะ..." oninput="onSearch()">
                
                <!-- Row 2: Anime results OR Character search -->
                <div id="animeSection">
                    <div id="animeResultsLabel" class="result-label" style="display:none;">
                        <span>ผลการค้นหาอนิเมะ</span>
                        <span id="animeCount"></span>
                    </div>
                    <div id="animeResults" class="scroll-container"></div>
                </div>
                
                <div id="charSection" style="display:none;">
                    <input id="charSearch" class="search-input" placeholder="ค้นหาตัวละครในเรื่อง..." oninput="onCharSearch()">
                    <div id="charResultsLabel" class="result-label">
                        <span>ตัวละครในเรื่อง</span>
                        <span id="charCount"></span>
                    </div>
                    <div id="charResults" class="scroll-container"></div>
                </div>
            </div>
        </aside>
    </div>

    <div id="confirmModal" class="modal" onclick="if(event.target === this) closeConfirm()">
        <div class="modal-box panel-card" style="max-width:320px;">
            <div class="modal-header">
                <h2>ยืนยันข้อมูล</h2>
                <button class="modal-close" onclick="closeConfirm()">&times;</button>
            </div>
            <div id="cImg"></div>
            <p id="cText"></p>
            <div class="action-row">
                <button onclick="submitMove()" class="btn-confirm">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="charDetailModal" class="modal" onclick="if(event.target === this) closeCharDetail()">
        <div class="modal-box panel-card" style="max-width:320px;">
            <div class="modal-header">
                <h2>รายละเอียดตัวละคร</h2>
                <button class="modal-close" onclick="closeCharDetail()">&times;</button>
            </div>
            <div id="charDetailImg" style="width:100%;border-radius:12px;overflow:hidden;margin-bottom:12px;"></div>
            <div id="charDetailInfo" style="text-align:center;"></div>
            <div class="action-row">
                <button onclick="disputeSelectedChar()" class="btn-dispute">ค้าน</button>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal" onclick="if(event.target === this) this.classList.remove('active')">
        <div class="modal-box panel-card" style="max-width:360px;">
            <div class="modal-header">
                <h2>ผลเกม</h2>
                <button class="modal-close" onclick="document.getElementById('gameOverModal').classList.remove('active')">&times;</button>
            </div>
            <p id="gameOverText" style="font-size:1.3rem;font-weight:700;color:#fff;text-align:center;"></p>
            <div class="action-row">
                <button onclick="document.getElementById('gameOverModal').classList.remove('active')" class="btn-confirm">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="bingoModal" class="modal" onclick="if(event.target === this) dismissBingoDispute()">
        <div class="modal-box panel-card" style="max-width:420px;">
            <button class="bingo-close" onclick="dismissBingoDispute()">&times;</button>
            <h2 style="text-align:center; margin-bottom:10px;">🎉 BINGO!</h2>
            <p id="bingoText" style="text-align:center; color:#fff; margin-bottom:16px;">มีคนทำบิงโกแล้ว!</p>
            <div id="bingoCountdown" class="bingo-countdown">10</div>
            <p style="text-align:center; color:#aaa; font-size:0.9rem;">มีเวลา 10 วินาทีในการค้าน</p>
        </div>
    </div>

    <div id="skipModal" class="modal" onclick="if(event.target === this) closeSkipModal()">
        <div class="modal-box panel-card" style="max-width:320px;">
            <div class="modal-header">
                <h2>ข้ามตา</h2>
                <button class="modal-close" onclick="closeSkipModal()">&times;</button>
            </div>
            <p id="skipText" style="text-align:center; color:#fff; margin:20px 0; font-size:1.1rem;"></p>
            <div class="action-row">
                <button onclick="closeSkipModal()" class="btn-confirm">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="resetModal" class="modal" onclick="if(event.target === this) closeResetModal()">
        <div class="modal-box panel-card" style="max-width:360px;">
            <div class="modal-header">
                <h2>รีเซ็ตเกม</h2>
                <button class="modal-close" onclick="closeResetModal()">&times;</button>
            </div>
            <p style="text-align:center; color:#fff; margin:16px 0; font-size:1.1rem;">ทำการรีเซ็ตโจทย์ไหม?</p>
            <div id="resetVoteInfo" style="text-align:center; color:#aaa; margin-bottom:16px; font-size:0.95rem;"></div>
            <div class="action-row" style="justify-content:center; gap:16px;">
                <button id="voteResetYes" onclick="socket.emit('vote_reset_game')" class="btn-confirm">รี</button>
                <button id="voteResetNo" onclick="socket.emit('vote_no_reset')" style="background:#e74c3c; color:white; border:none; border-radius:16px; padding:14px 30px; font-weight:700; cursor:pointer;">ไม่รี</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
