<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Anime Bingo Matrix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #a55eea; --dark: #0f0f1e; --cell: #1e1e2f; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; }
        
        /* ตารางแบบ Matrix 5x5 + หัวข้อ Row/Col */
        .bingo-grid { 
            display: grid; 
            grid-template-columns: 100px repeat(5, 120px); /* 1 ช่องหัวแถว + 5 ช่องเนื้อหา */
            gap: 5px; 
            margin: 20px auto; 
            width: fit-content; 
        }
        
        .cell { 
            width: 120px; height: 120px; background: var(--cell); 
            border: 1px solid #333; display: flex; align-items: center; 
            justify-content: center; position: relative; border-radius: 8px;
        }

        /* สีแยกแกนให้ดูง่าย */
        .header-col { background: #3498db; height: 60px; font-weight: bold; font-size: 0.9rem; } /* แนวตั้ง */
        .header-row { background: #e74c3c; width: 100px; font-weight: bold; font-size: 0.9rem; } /* แนวนอน */
        
        .empty-corner { background: transparent; border: none; }
        .claimed img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        
        /* แสดงเงื่อนไขเล็กๆ ในช่อง */
        .hint { position: absolute; bottom: 2px; font-size: 0.6rem; color: #777; pointer-events: none; }
    </style>
</head>
<body>

    <div id="status">กำลังเชื่อมต่อ...</div>
    <div class="bingo-grid" id="grid"></div>

    <script>
        const socket = io();

        socket.on('game_started', (data) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            // 1. สร้างแถวแรก (มุมว่าง + หัวข้อ Column)
            const corner = document.createElement('div');
            corner.className = 'cell empty-corner';
            grid.appendChild(corner);

            data.col_headers.forEach(text => {
                const head = document.createElement('div');
                head.className = 'cell header-col';
                head.innerText = text;
                grid.appendChild(head);
            });

            // 2. สร้างแถวที่เหลือ (หัวข้อ Row + ช่อง Bingo)
            for (let r = 0; r < 5; r++) {
                // หัวข้อ Row (แนวนอน)
                const rowHead = document.createElement('div');
                rowHead.className = 'cell header-row';
                rowHead.innerText = data.row_headers[r];
                grid.appendChild(rowHead);

                // ช่องเนื้อหา 5 ช่องในแถวนั้น
                for (let c = 0; c < 5; c++) {
                    const sid = `${r}-${c}`;
                    const cell = document.createElement('div');
                    cell.id = `slot-${sid}`;
                    cell.className = 'cell';
                    
                    if (data.claimed[sid]) {
                        cell.innerHTML = `<img src="${data.claimed[sid].img}">`;
                    } else {
                        cell.innerHTML = `? <div class="hint">${data.col_headers[c]} + ${data.row_headers[r]}</div>`;
                    }

                    // ระบบลากวาง (Drag & Drop)
                    cell.ondragover = (e) => e.preventDefault();
                    cell.ondrop = (e) => {
                        const charData = JSON.parse(e.dataTransfer.getData('text'));
                        socket.emit('claim_slot', { 
                            slot_id: sid, 
                            name: charData.name, 
                            img: charData.img 
                        });
                    };
                    grid.appendChild(cell);
                }
            }
            document.getElementById('status').innerText = "เกมเริ่มแล้ว! หาตัวละครที่ตรงกับเงื่อนไขทั้งแนวตั้งและแนวนอน";
        });

        socket.on('slot_claimed', (res) => {
            const target = document.getElementById(`slot-${res.data.slot_id}`);
            target.innerHTML = `<img src="${res.data.img}">`;
            target.classList.add('claimed');
        });
    </script>
</body>
</html>
